<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery · Matcha Bar Studio</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="page">
  <nav class="navbar">
    <div class="brand"><span class="logo-dot"></span> Matcha Bar Studio</div>
    <div class="nav-links">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('studio') }}">Studio</a>
      <a href="{{ url_for('gallery') }}" class="active">Gallery</a>
      <a href="{{ url_for('gallery') }}">Profile</a>
    </div>
    <a href="{{ url_for('studio') }}" class="btn btn-primary">Start Mixing</a>
  </nav>

  <div class="profile-hero">
    <div class="avatar">🌸</div>
    <div>
      <div style="font-size:0.75rem; opacity:0.8;">PROFILE</div>
      <h2 style="margin:2px 0;">yuki_brews</h2>
      <div style="font-size:0.85rem; opacity:0.9;">Matcha enthusiast · Tokyo 🇯🇵 · 4 saved recipes</div>
    </div>
    <div class="stats">
      <div><strong>4</strong><span>Recipes</span></div>
      <div><strong>8.4k</strong><span>Likes</span></div>
      <div><strong>2.1k</strong><span>Followers</span></div>
    </div>
  </div>

  <div class="filter-row">
    <div class="filter-tabs">
      <button class="active">All</button>
      <button>My Recipes</button>
      <button>Liked</button>
      <button>Bookmarked</button>
    </div>
    <div style="display:flex; gap:10px;">
      <input class="search-box" placeholder="Search recipes...">
      <button class="btn btn-outline">▽ Most Liked</button>
    </div>
  </div>

  <section class="block" style="border-top:none;">
    <div class="section-head">
      <h3 style="margin:0;">8 recipes</h3>
      <a href="{{ url_for('studio') }}">Create new →</a>
    </div>
    <div class="recipe-grid" id="galleryGrid"></div>
  </section>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
